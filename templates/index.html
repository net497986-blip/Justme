<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WormGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ── Base (same as before, plus additions) ── */
        :root {
            --red-deep: #6B0000;
            --red-core: #CC0000;
            --red-bright: #FF2020;
            --red-glow: #FF4444;
            --red-soft: #FF6666;
            --black: #080808;
            --dark1: #0F0F0F;
            --dark2: #181818;
            --dark3: #222;
            --sidebar-w: 300px;
            --text: #FFF;
            --text-dim: #AAA;
            --text-muted: #555;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body {
            font-family: 'Noto+Sans+Arabic','Inter',sans-serif;
            background:var(--black); color:var(--text);
            display:flex; flex-direction:column;
        }
        /* ── BG ── */
        .bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .worm { position:absolute; border-radius:50%; filter:blur(70px); opacity:.055; animation:wormMove var(--d,12s) ease-in-out infinite alternate; }
        .w1 { width:320px; height:320px; background:var(--red-bright); top:-120px; left:-100px; --d:14s; }
        .w2 { width:220px; height:220px; background:var(--red-core); bottom:15%; right:-80px; --d:10s; }
        .w3 { width:160px; height:160px; background:var(--red-glow); top:45%; left:55%; --d:17s; }
        @keyframes wormMove { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(35px,55px) scale(1.12);} }
        .grid-overlay { position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(180,0,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(180,0,0,.022) 1px,transparent 1px); background-size:40px 40px; }
        .scan-line { position:fixed; top:0; left:0; right:0; height:2px; z-index:1; pointer-events:none; background:linear-gradient(90deg,transparent,rgba(204,0,0,.1),transparent); animation:scan 9s linear infinite; }
        @keyframes scan { 0%{transform:translateY(-2px);} 100%{transform:translateY(100vh);} }
        .app { position:relative; z-index:2; display:flex; flex-direction:column; height:100dvh; }

        /* ── HEADER ── */
        .header {
            display:flex; align-items:center; justify-content:space-between;
            padding:11px 14px 9px;
            background:rgba(8,0,0,.97);
            border-bottom:1px solid #1A0000;
            flex-shrink:0; flex-wrap:wrap; gap:8px;
        }
        .h-left { display:flex; align-items:center; gap:9px; }
        .menu-btn {
            width:34px; height:34px; background:var(--dark2); border:1px solid #250000; border-radius:9px;
            display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all .17s;
        }
        .menu-btn:active { background:#2A0000; }
        .menu-btn svg { width:17px; height:17px; fill:var(--text-dim); }
        .logo-wrap { display:flex; align-items:center; gap:9px; }
        .logo-icon {
            width:34px; height:34px; background:linear-gradient(135deg,var(--red-deep),var(--red-core)); border-radius:9px;
            display:flex; align-items:center; justify-content:center; border:1px solid var(--red-bright);
            box-shadow:0 0 12px rgba(204,0,0,.45);
        }
        .logo-icon svg { width:20px; height:20px; fill:var(--red-glow); filter:drop-shadow(0 0 4px var(--red-bright)); }
        .logo-name { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; color:var(--red-bright); letter-spacing:1px; text-shadow:0 0 10px rgba(255,50,50,.6); line-height:1; }
        .logo-sub { font-size:7.5px; color:var(--red-soft); letter-spacing:2.5px; opacity:.55; margin-top:2px; }
        .h-right { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .lang-btn {
            background:var(--dark2); border:1px solid #2A0000; border-radius:6px;
            color:var(--text-dim); padding:4px 10px; font-size:11px; cursor:pointer; transition:.2s; font-weight:500;
        }
        .lang-btn:hover { border-color:var(--red-core); color:#fff; }
        .lang-btn.active { background:var(--red-core); color:#fff; border-color:var(--red-bright); }
        .settings-btn, .subscribe-btn {
            background:var(--dark2); border:1px solid #2A0000; border-radius:6px;
            color:var(--text-dim); padding:4px 10px; font-size:12px; cursor:pointer; transition:.2s; font-weight:500;
        }
        .settings-btn:hover, .subscribe-btn:hover { border-color:var(--red-core); color:#fff; }
        .subscribe-btn { background:linear-gradient(135deg,var(--red-deep),var(--red-core)); color:#fff; border-color:var(--red-bright); }
        .subscribe-btn:hover { background:var(--red-bright); }
        .new-chat-btn {
            display:flex; align-items:center; gap:5px; padding:6px 11px;
            background:linear-gradient(135deg,var(--red-deep),var(--red-core));
            border:1px solid var(--red-bright); border-radius:9px;
            font-size:11.5px; font-weight:600; color:#fff; cursor:pointer; transition:all .17s;
            box-shadow:0 0 10px rgba(204,0,0,.3);
        }
        .new-chat-btn:active { transform:scale(.93); }
        .new-chat-btn svg { width:13px; height:13px; fill:#fff; }
        .telegram-link {
            display:flex; align-items:center; gap:4px;
            background:var(--dark2); border:1px solid #2A0000; border-radius:6px;
            padding:3px 10px; font-size:11px; color:var(--text-dim); text-decoration:none; transition:.2s; font-weight:500;
        }
        .telegram-link:hover { border-color:var(--red-core); color:#fff; }
        .telegram-link svg { width:14px; height:14px; fill:currentColor; }

        /* ── SIDEBAR ── */
        .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:50; opacity:0; pointer-events:none; transition:opacity .3s; }
        .sidebar-overlay.open { opacity:1; pointer-events:all; }
        .sidebar {
            position:fixed; top:0; right:0; bottom:0; width:var(--sidebar-w);
            background:#0D0000; border-left:1px solid #220000; z-index:51;
            display:flex; flex-direction:column; transform:translateX(100%);
            transition:transform .3s cubic-bezier(.4,0,.2,1); overflow-y:auto;
        }
        .sidebar.open { transform:translateX(0); }
        .sb-user { display:flex; align-items:center; gap:12px; padding:16px 14px; border-bottom:1px solid #1E0000; flex-shrink:0; }
        .sb-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--red-deep),var(--red-core)); border:2px solid var(--red-bright); display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; font-weight:700; box-shadow:0 0 15px rgba(204,0,0,.3); }
        .sb-user-info { flex:1; min-width:0; }
        .sb-user-name { font-size:14px; font-weight:600; color:#fff; line-height:1.2; }
        .sb-user-email { font-size:11px; color:var(--text-muted); }
        .sb-user-balance { font-size:11px; color:var(--red-soft); margin-top:2px; }
        .sb-user-balance .infinity { font-size:16px; color:var(--red-bright); }
        .sb-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid #1E0000; flex-shrink:0; }
        .sb-title { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; color:var(--red-bright); letter-spacing:1px; }
        .sb-close { width:30px; height:30px; background:var(--dark2); border:1px solid #2A0000; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .sb-close svg { width:15px; height:15px; fill:var(--text-muted); }
        .sb-new { margin:10px 12px; display:flex; align-items:center; gap:7px; padding:9px 12px; background:linear-gradient(135deg,#1A0000,#250000); border:1px solid var(--red-core); border-radius:10px; font-size:12px; color:var(--red-glow); cursor:pointer; transition:all .17s; }
        .sb-new:active { background:#2A0000; }
        .sb-new svg { width:14px; height:14px; fill:var(--red-glow); }
        .sb-list { flex:1; overflow-y:auto; padding:6px 8px; scrollbar-width:thin; scrollbar-color:#330000 transparent; }
        .sb-list::-webkit-scrollbar { width:3px; }
        .sb-list::-webkit-scrollbar-thumb { background:#440000; border-radius:3px; }
        .sb-section-label { font-size:9px; color:var(--text-muted); letter-spacing:2px; padding:8px 6px 4px; text-transform:uppercase; }
        .sb-item { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:9px; cursor:pointer; transition:background .15s; margin-bottom:2px; position:relative; }
        .sb-item:hover, .sb-item.active { background:#1A0000; }
        .sb-item.active { border-right:2px solid var(--red-core); }
        .sb-item-icon { width:26px; height:26px; background:#1E0000; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .sb-item-icon svg { width:13px; height:13px; fill:var(--red-glow); }
        .sb-item-text { flex:1; min-width:0; }
        .sb-item-title { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
        .sb-item-date { font-size:9.5px; color:var(--text-muted); margin-top:1px; }
        .sb-item-del { width:22px; height:22px; background:#2A0000; border-radius:5px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; cursor:pointer; flex-shrink:0; }
        .sb-item:hover .sb-item-del { opacity:1; }
        .sb-item-del svg { width:11px; height:11px; fill:#FF5555; }
        .sb-subscription { margin:4px 12px 8px; padding:10px; background:#0A0000; border:1px solid #1A0000; border-radius:10px; flex-shrink:0; }
        .sb-sub-title { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
        .sb-sub-title .infinity { color:var(--red-bright); font-size:16px; }
        .sb-plans { display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:4px; margin-bottom:6px; }
        .sb-plan { background:var(--dark2); border:1px solid #1A0000; border-radius:6px; padding:4px 2px; text-align:center; cursor:pointer; transition:.2s; font-size:9px; color:var(--text-muted); }
        .sb-plan:hover { border-color:var(--red-core); color:#fff; }
        .sb-plan.active { background:#1A0000; border-color:var(--red-core); color:var(--red-glow); }
        .sb-plan .price { font-size:11px; font-weight:700; color:#fff; }
        .sb-activate-row { display:flex; gap:4px; align-items:center; }
        .sb-activate-row input { flex:1; padding:4px 8px; background:var(--dark2); border:1px solid #1A0000; border-radius:6px; color:#fff; font-size:10px; font-family:inherit; outline:none; }
        .sb-activate-row input:focus { border-color:var(--red-core); }
        .sb-activate-row button { padding:4px 12px; background:linear-gradient(135deg,var(--red-deep),var(--red-core)); border:none; border-radius:6px; color:#fff; font-size:10px; font-weight:600; cursor:pointer; transition:.2s; }
        .sb-activate-row button:hover { background:var(--red-bright); }
        .sb-activate-row button:active { transform:scale(.95); }
        .sb-status-msg { font-size:9px; color:var(--text-muted); margin-top:4px; min-height:16px; }
        .sb-logout { margin:8px 12px 12px; padding:8px; background:var(--dark2); border:1px solid #2A0000; border-radius:8px; display:flex; align-items:center; gap:8px; justify-content:center; cursor:pointer; transition:.2s; font-size:12px; color:var(--text-muted); flex-shrink:0; }
        .sb-logout:hover { background:#2A0000; border-color:var(--red-core); color:#fff; }
        .sb-logout svg { width:14px; height:14px; fill:currentColor; }

        /* ── SETTINGS FULL OVERLAY ── */
        .settings-full-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:100;
            display:none; align-items:center; justify-content:center;
            backdrop-filter:blur(8px);
        }
        .settings-full-overlay.open { display:flex; }
        .settings-full-container {
            width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
            background:var(--bg); border-radius:20px; border:1px solid var(--border);
            padding:0; margin:20px; position:relative;
            box-shadow:0 0 60px rgba(204,0,0,.15);
        }
        .settings-full-close {
            position:sticky; top:0; z-index:20;
            display:flex; justify-content:flex-end; padding:12px 16px;
            background:rgba(8,8,8,.92); backdrop-filter:blur(4px);
            border-bottom:1px solid #1A0000;
        }
        .settings-full-close button {
            background:var(--dark2); border:1px solid #2A0000; border-radius:50%;
            width:36px; height:36px; color:var(--text-dim); font-size:18px;
            cursor:pointer; transition:.2s;
        }
        .settings-full-close button:hover { background:var(--red-core); color:#fff; border-color:var(--red-bright); }

        /* ── Embed settings styles ── */
        .settings-inner {
            padding:0 16px 24px;
        }
        .settings-inner .page { display:none; flex-direction:column; }
        .settings-inner .page.active { display:flex; }
        .settings-inner .topbar {
            display:flex; align-items:center; padding:12px 0 8px; gap:12px;
            position:sticky; top:0; background:var(--bg); z-index:10;
        }
        .settings-inner .back-btn {
            width:34px; height:34px; background:var(--card); border:1px solid var(--border); border-radius:50%;
            display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text);
            font-size:18px; line-height:1; flex-shrink:0; transition:background .15s;
        }
        .settings-inner .back-btn:hover { background:var(--card2); }
        .settings-inner .topbar-title { font-size:17px; font-weight:700; }
        .settings-inner .sheet { flex:1; padding:8px 0 40px; display:flex; flex-direction:column; gap:24px; }
        .settings-inner .section-label { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px; padding-left:4px; }
        .settings-inner .card { background:var(--card); border-radius:16px; overflow:hidden; border:1px solid var(--border); }
        .settings-inner .row {
            display:flex; align-items:center; gap:14px; padding:14px 16px;
            border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; text-decoration:none; color:inherit;
        }
        .settings-inner .row:last-child { border-bottom:none; }
        .settings-inner .row:hover { background:rgba(255,255,255,.03); }
        .settings-inner .row:active { background:rgba(255,255,255,.06); }
        .settings-inner .row-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--card2); }
        .settings-inner .row-icon svg { width:17px; height:17px; stroke:var(--text); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
        .settings-inner .row-icon.red { background:var(--red-dim); }
        .settings-inner .row-icon.red svg { stroke:var(--red); }
        .settings-inner .row-icon.green { background:rgba(52,199,89,.12); }
        .settings-inner .row-icon.green svg { stroke:var(--green); }
        .settings-inner .row-body { flex:1; min-width:0; }
        .settings-inner .row-label { font-size:15px; font-weight:400; }
        .settings-inner .row-desc { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.4; }
        .settings-inner .row-right { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; flex-shrink:0; }
        .settings-inner .chevron { font-size:17px; opacity:.45; }
        .settings-inner .badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; background:var(--red-dim); color:var(--red); }
        .settings-inner .badge.green { background:rgba(52,199,89,.15); color:var(--green); }
        .settings-inner .row.danger .row-label { color:var(--red); }
        .settings-inner .row.danger .row-icon svg { stroke:var(--red); }
        .settings-inner .toggle { position:relative; width:46px; height:27px; flex-shrink:0; cursor:pointer; }
        .settings-inner .toggle input { opacity:0; width:0; height:0; }
        .settings-inner .t-track { position:absolute; inset:0; background:#3a3a3a; border-radius:14px; transition:background .25s; }
        .settings-inner .toggle input:checked ~ .t-track { background:var(--red); }
        .settings-inner .t-thumb { position:absolute; top:3px; left:3px; width:21px; height:21px; background:#fff; border-radius:50%; transition:transform .25s; pointer-events:none; }
        .settings-inner .toggle input:checked ~ .t-thumb { transform:translateX(19px); }
        .settings-inner .sel-wrap { position:relative; }
        .settings-inner .sel-wrap select { appearance:none; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:7px 28px 7px 12px; border-radius:10px; font-size:13px; font-family:inherit; cursor:pointer; outline:none; }
        .settings-inner .sel-wrap::after { content:'⌄'; position:absolute; right:10px; top:50%; transform:translateY(-52%); color:var(--muted); font-size:13px; pointer-events:none; }
        .settings-inner .mem-card { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:16px; }
        .settings-inner .mem-top { display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px; }
        .settings-inner .mem-bar-bg { background:#333; border-radius:4px; height:6px; overflow:hidden; }
        .settings-inner .mem-fill { height:100%; border-radius:4px; background:var(--red); }
        .settings-inner .mem-sub { font-size:12px; color:var(--muted); margin-top:8px; }
        .settings-inner .search-input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:11px 16px 11px 40px; color:var(--text); font-size:14px; font-family:inherit; outline:none; }
        .settings-inner .search-wrap { position:relative; }
        .settings-inner .search-wrap svg { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2; stroke-linecap:round; pointer-events:none; }
        .settings-inner .empty-state { display:flex; flex-direction:column; align-items:center; gap:10px; padding:40px 0; color:var(--muted); text-align:center; }
        .settings-inner .empty-state svg { width:38px; height:38px; stroke:#444; fill:none; stroke-width:1.4; }
        .settings-inner .empty-title { font-size:15px; font-weight:600; color:#555; }
        .settings-inner .empty-sub { font-size:13px; max-width:230px; line-height:1.5; }
        .settings-inner .donut-wrap { display:flex; flex-direction:column; align-items:center; padding:24px; background:var(--card2); border:1px solid var(--border); border-radius:14px; margin-bottom:12px; }
        .settings-inner .donut-ring { position:relative; width:120px; height:120px; }
        .settings-inner .donut-ring svg { transform:rotate(-90deg); }
        .settings-inner .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:20px; font-weight:700; line-height:1.2; }
        .settings-inner .donut-center small { font-size:11px; color:var(--muted); font-weight:400; }
        .settings-inner .subscribe-card { background:linear-gradient(135deg,#1a0a0a 0%,#2a0d0d 100%); border:1px solid rgba(224,48,48,.3); border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:16px; }
        .settings-inner .sub-title { font-size:20px; font-weight:800; }
        .settings-inner .sub-title span { color:var(--red); }
        .settings-inner .sub-desc { font-size:14px; color:#bbb; line-height:1.6; }
        .settings-inner .sub-features { display:flex; flex-direction:column; gap:10px; }
        .settings-inner .sub-feature { display:flex; align-items:center; gap:10px; font-size:14px; color:#ccc; }
        .settings-inner .sub-feature svg { width:16px; height:16px; stroke:var(--green); fill:none; stroke-width:2.5; flex-shrink:0; }
        .settings-inner .sub-btn { width:100%; padding:14px; background:var(--red); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; transition:opacity .15s; }
        .settings-inner .sub-btn:hover { opacity:.88; }
        .settings-inner .sub-note { font-size:12px; color:var(--muted); text-align:center; }
        .settings-inner .plan-row { display:flex; align-items:center; padding:16px; background:var(--card2); border:1px solid var(--border); border-radius:12px; gap:14px; cursor:pointer; transition:border-color .2s; margin-bottom:8px; }
        .settings-inner .plan-row.selected { border-color:var(--red); }
        .settings-inner .plan-row-body { flex:1; }
        .settings-inner .plan-name { font-size:15px; font-weight:600; }
        .settings-inner .plan-price { font-size:13px; color:var(--muted); margin-top:2px; }
        .settings-inner .radio { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .settings-inner .plan-row.selected .radio { border-color:var(--red); }
        .settings-inner .radio-dot { width:10px; height:10px; border-radius:50%; background:var(--red); display:none; }
        .settings-inner .plan-row.selected .radio-dot { display:block; }
        .settings-inner .about-logo { display:flex; flex-direction:column; align-items:center; gap:12px; padding:32px 0 16px; }
        .settings-inner .logo-circle { width:72px; height:72px; border-radius:20px; background:var(--red-dim); border:1px solid rgba(224,48,48,.3); display:flex; align-items:center; justify-content:center; }
        .settings-inner .logo-circle svg { width:36px; height:36px; stroke:var(--red); fill:none; stroke-width:1.6; }
        .settings-inner .about-name { font-size:22px; font-weight:800; }
        .settings-inner .about-ver { font-size:13px; color:var(--muted); }
        /* override some colors for settings inside */

            if (currentUser.role === 'dev') return;
            currentUser.tokens = (currentUser.tokens || 0) + amount;

        function checkActivation() {
            const code = document.getElementById('activationCode').value.trim();
            const status = document.getElementById('activationStatus');
            if (usedCodes.includes(code)) {
                status.textContent = translations[currentLang].activationUsed;
                status.style.color = '#FFAA00';
            } else if (VALID_CODES[code]) {
                status.textContent = '✅ ' + (translations[currentLang].activationSuccess || 'كود صالح! اضغط تفعيل');
                status.style.color = '#66FF66';
            } else if (code.length > 0) {
                status.textContent = translations[currentLang].activationError;
                status.style.color = '#FF4444';
            } else { status.textContent = ''; }
        }

        function activatePlan() {
            const code = document.getElementById('activationCode').value.trim();
            const status = document.getElementById('activationStatus');
            const t = translations[currentLang];
            if (!code) { status.textContent = '⚠️ ' + (t.activationPlaceholder || 'أدخل كود التفعيل');
                status.style.color = '#FFAA00'; return; }
            if (usedCodes.includes(code)) { status.textContent = t.activationUsed;
                status.style.color = '#FFAA00'; return; }
            if (VALID_CODES[code]) {
                const plan = VALID_CODES[code];
                usedCodes.push(code);
                localStorage.setItem('wgpt_used_codes', JSON.stringify(usedCodes));
                const planNames = { month: t.planMonth || 'شهر', '3months': t.plan3Months || '3 أشهر', '6months': t.plan6Months || '6 أشهر', year: t.planYear || 'سنة', lifetime: t.planLifetime || 'إلى الأبد' };
                activeSubscription = planNames[plan] || plan;
                localStorage.setItem('wgpt_subscription', activeSubscription);
                const duration = PLAN_DURATIONS[plan];
                if (duration === -1) { subscriptionEnd = null; } else { const endDate = new Date(); endDate.setDate(endDate.getDate() + duration); subscriptionEnd = endDate.toISOString(); }
                localStorage.setItem('wgpt_sub_end', subscriptionEnd);
                if (currentUser.role === 'user') addTokens(50);
                status.textContent = (t.activationSuccess || '✅ تم التفعيل بنجاح! الاشتراك: ') + activeSubscription;
                status.style.color = '#66FF66';
                document.getElementById('activationCode').value = '';
                toast('✅ تم تفعيل الاشتراك: ' + activeSubscription);
                setTimeout(() => { status.textContent = ''; }, 5000);
                updateUserUI();
            } else {
                status.textContent = t.activationError;
                status.style.color = '#FF4444';
            }
        }

        function renderSidebar() {
            const list = document.getElementById('sbList');
            list.innerHTML = '';
            if (!conversations.length) {
                list.innerHTML = `<div style="padding:20px;text-align:center;font-size:11px;color:var(--text-muted);">${translations[currentLang].noChats}</div>`;
                return;
            }
            const now = Date.now(), day = 86400000;
            const groups = { today: [], yesterday: [], older: [] };
            [...conversations].reverse().forEach(c => {
                const age = now - c.date;
                if (age < day) groups.today.push(c);
                else if (age < 2 * day) groups.yesterday.push(c);
                else groups.older.push(c);
            });
            const labels = { today: 'اليوم', yesterday: 'أمس', older: 'أقدم' };
            if (currentLang === 'en') { labels.today = 'Today'; labels.yesterday = 'Yesterday'; labels.older = 'Older'; }
            if (currentLang === 'ru') { labels.today = 'Сегодня'; labels.yesterday = 'Вчера'; labels.older = 'Старые'; }
            for (const [k, arr] of Object.entries(groups)) {
                if (!arr.length) continue;
                const lbl = document.createElement('div'); lbl.className = 'sb-section-label'; lbl.textContent = labels[k]; list.appendChild(lbl);
                arr.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'sb-item' + (c.id === activeCid ? ' active' : '');
                    item.innerHTML = `

        // ── SEND MESSAGE ──
        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            if (!text && !pendingFiles.length) return;
            if (isTyping) return;
            if (!checkSubscription()) return;
            if (!consumeToken()) return;

            document.getElementById('centerHint')?.remove();
            const conv = getOrCreateConv();
            const files = pendingFiles.slice();
            const userContent = text || (files.length ? `📎 ${files.length} ملف` : '');
            conv.messages.push({ role: 'user', content: userContent, thinkOn, searchOn });
            if (conv.messages.length === 1) conv.title = text.slice(0,38) || (files.length ? 'محادثة مع ملفات' : 'محادثة جديدة');
            conv.date = Date.now();
            saveConvs();
            addMsgDOM('user', userContent, files);
            inp.value = ''; inp.style.height = 'auto';
            pendingFiles = []; renderFileStrip();

            const thinkBlock = document.createElement('div');
            thinkBlock.className = 'thinking'; thinkBlock.id = 'thinkIndicator';
            thinkBlock.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><div class="thinking-text">${thinkOn ? (translations[currentLang].thinking || 'يفكر...') : (searchOn ? (translations[currentLang].searching || 'يبحث...') : (translations[currentLang].typing || 'يكتب...'))}</div>`;
            document.getElementById('chatArea').appendChild(thinkBlock);

            isTyping = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const mode = thinkOn ? 'think' : (searchOn ? 'search' : 'chat');
                const model = getModelPreference();
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userContent, mode, files: files.map(f=>f.name), model })
                });
                const data = await response.json();
                document.getElementById('thinkIndicator')?.remove();
                if (data.response) {
                    await typeMessage(data.response, thinkOn, searchOn);
                } else {
                    addMsgDOM('ai', translations[currentLang].error || '⚠️ حدث خطأ في المعالجة.', null, thinkOn, searchOn);
                }
            } catch (e) {
                document.getElementById('thinkIndicator')?.remove();
                addMsgDOM('ai', translations[currentLang].error || '⚠️ حدث خطأ: ' + e.message, null, thinkOn, searchOn);
            }
            isTyping = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function typeMessage(fullText, tk, sk) {
            return new Promise((resolve) => {
                const area = document.getElementById('chatArea');
                const now = new Date().toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
                const wrap = document.createElement('div');
                wrap.className = 'msg ai';
                const av = document.createElement('div'); av.className = 'msg-avatar'; av.innerHTML = OPENAI_SVG; wrap.appendChild(av);
                const col = document.createElement('div'); col.className = 'msg-col';
                const bub = document.createElement('div'); bub.className = 'msg-bubble'; bub.textContent = ''; col.appendChild(bub);
                const meta = document.createElement('div'); meta.className = 'msg-meta';
                if (tk) { const t = document.createElement('span'); t.className = 'mode-tag think'; t.textContent = '🧠 تفكير'; meta.appendChild(t); }
                if (sk) { const t = document.createElement('span'); t.className = 'mode-tag search'; t.textContent = '🔍 بحث'; meta.appendChild(t); }
                const tm = document.createElement('span'); tm.textContent = now; meta.appendChild(tm);
                col.appendChild(meta);
                const copyBtn = document.createElement('button'); copyBtn.className = 'copy-reply-btn';
                copyBtn.textContent = translations[currentLang].copyReply || 'نسخ الرد';
                copyBtn.onclick = () => copyFullReply(fullText);
                col.appendChild(copyBtn);
                wrap.appendChild(col);
                area.appendChild(wrap);
                area.scrollTop = area.scrollHeight;

                const lines = fullText.split('\n');
                let currentIndex = 0;
                function addNextLine() {
                    if (currentIndex < lines.length) {
                        let currentText = lines.slice(0, currentIndex+1).join('\n');
                        bub.innerHTML = formatMessage(currentText);
                        area.scrollTop = area.scrollHeight;
                        currentIndex++;
                        setTimeout(addNextLine, lines.length > 20 ? 30 : 50);
                    } else {
                        bub.innerHTML = formatMessage(fullText);
                        area.scrollTop = area.scrollHeight;
                        bub.querySelectorAll('pre code').forEach(block => { hljs.highlightElement(block); });
                        resolve();
                    }
                }
                setTimeout(addNextLine, 100);
            });
        }

        function addMsgDOM(role, text, files, tk, sk) {
            const area = document.getElementById('chatArea');
            const now = new Date().toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
            const wrap = document.createElement('div'); wrap.className = 'msg ' + role;
            const av = document.createElement('div'); av.className = 'msg-avatar';
            if (role === 'ai') av.innerHTML = OPENAI_SVG; else av.textContent = '👤';
            wrap.appendChild(av);
            const col = document.createElement('div'); col.className = 'msg-col';
            if (files?.length) {
                files.forEach(f => {
                    const fm = document.createElement('div'); fm.className = 'file-msg';
                    const isImg = f.type?.startsWith('image/');
                    fm.innerHTML = `<div class="file-icon-msg"><svg viewBox="0 0 24 24">${isImg ? '<path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>' : '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>'}</svg></div><div><div class="file-name">${escHtml(f.name)}</div><div class="file-size">${fmtSize(f.size)}</div></div>`;
                    col.appendChild(fm);
                });
            }
            if (text) {
                const bub = document.createElement('div'); bub.className = 'msg-bubble';
                bub.innerHTML = formatMessage(text);
                col.appendChild(bub);
                if (role === 'ai') {
                    const copyBtn = document.createElement('button'); copyBtn.className = 'copy-reply-btn';
                    copyBtn.textContent = translations[currentLang].copyReply || 'نسخ الرد';
                    copyBtn.onclick = () => copyFullReply(text);
                    col.appendChild(copyBtn);
                    setTimeout(() => { bub.querySelectorAll('pre code').forEach(block => { hljs.highlightElement(block); }); }, 50);
                }
            }
            const meta = document.createElement('div'); meta.className = 'msg-meta';
            if (role === 'ai') {
                if (tk) { const t = document.createElement('span'); t.className = 'mode-tag think'; t.textContent = '🧠 تفكير'; meta.appendChild(t); }
                if (sk) { const t = document.createElement('span'); t.className = 'mode-tag search'; t.textContent = '🔍 بحث'; meta.appendChild(t); }
            }
            const tm = document.createElement('span'); tm.textContent = now; meta.appendChild(tm);
            col.appendChild(meta);
            wrap.appendChild(col);
            area.appendChild(wrap);
            area.scrollTop = area.scrollHeight;
        }

        function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function formatMessage(text) {
            if (!text) return '';
            let blocks = [];
            let processed = text.replace(/```(\w+)?\n([\s\S]*?)\n```/g, function(match, lang, code) {
                blocks.push({ lang: lang || 'code', code: code });
                return `__CODE_BLOCK_${blocks.length-1}__`;
            });
            processed = escHtml(processed);
            const t = translations[currentLang];
            let result = processed.replace(/__CODE_BLOCK_(\d+)__/g, function(match, index) {
                const block = blocks[parseInt(index)];
                if (!block) return match;
                const code = escHtml(block.code);
                const langLabel = block.lang || 'code';
                return `<div class="code-block">
                    <div class="code-header">
                        <span class="code-lang">${langLabel}</span>
                        <button class="copy-btn" onclick="copyCode(${JSON.stringify(block.code)})">${t.copyBtn || 'نسخ'}</button>
                    </div>
                    <pre><code class="language-${langLabel}">${code}</code></pre>
                </div>`;
            });
            result = result.replace(/\n\n/g, '<br><br>');
            result = result.replace(/\n/g, '<br>');
            return result;
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => { toast(translations[currentLang].copied); }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                toast(translations[currentLang].copied);
            });
        }

        function copyFullReply(text) {
            navigator.clipboard.writeText(text).then(() => { toast(translations[currentLang].copied); }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                toast(translations[currentLang].copied);
            });
        }

        function toast(msg) {
            const el = document.getElementById('toast-el');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }

                            <div class="card">
                                <div class="row" onclick="settingsOpenSubscription()">
                                    <div class="row-icon green"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                                    <div class="row-body"><div class="row-label">${t.subscribeTitle || 'اشتراك'}</div><div class="row-desc">${t.subscribeDesc || 'اختر الباقة'}</div></div>
                                    <div class="row-right"><span class="chevron">›</span></div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="section-label">معلومات</div>
                            <div class="card">
                                <div class="row" onclick="settingsGo('page-about')">
                                    <div class="row-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                                    <div class="row-body"><div class="row-label">حول</div></div>
                                    <div class="row-right"><span class="chevron">›</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="row danger" onclick="settingsConfirm('logout')">
                                <div class="row-icon red"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
                                <div class="row-body"><div class="row-label">تسجيل خروج</div></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- About page -->
                <div class="page" id="page-about">
                    <div class="topbar">
                        <div class="back-btn" onclick="settingsBack()">‹</div>
                        <span class="topbar-title">حول</span>
                    </div>
                    <div class="sheet">
                        <div class="about-logo">
                            <div class="logo-circle"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
                            <div class="about-name">WormGPT</div>
                            <div class="about-ver">الإصدار 1.0.0</div>
                        </div>
                        <div class="card">
                            <div class="row" onclick="toast('سياسة الخصوصية')">
                                <div class="row-body"><div class="row-label">سياسة الخصوصية</div></div>
                                <div class="row-right"><span class="chevron">›</span></div>
                            </div>
                            <div class="row" onclick="toast('شروط الاستخدام')">
                                <div class="row-body"><div class="row-label">شروط الاستخدام</div></div>
                                <div class="row-right"><span class="chevron">›</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Subscription page (full) -->
                <div class="page" id="page-subscribe">
                    <div class="topbar">
                        <div class="back-btn" onclick="settingsBack()">‹</div>
                        <span class="topbar-title">${t.subscribeTitle || 'الاشتراك'}</span>
                    </div>
                    <div class="sheet">
                        <div class="subscribe-card">
                            <div class="sub-title">💎 <span>${t.subscribeTitle || 'الاشتراك'}</span></div>
                            <div class="sub-desc">${t.subscribeDesc || 'اختر الباقة المناسبة لك'}</div>
                            <div class="sub-features">
                                <div class="sub-feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> رسائل غير محدودة</div>
                                <div class="sub-feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> سرعة استجابة فائقة</div>
                                <div class="sub-feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> تفكير متقدم</div>
                                <div class="sub-feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> البحث في الويب</div>
                                <div class="sub-feature"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> رفع الملفات والصور</div>
                            </div>
                        </div>
                        <div>
                            <div class="section-label">اختر الباقة</div>
                            <div class="plan-row selected" id="sp-month" onclick="settingsSelectPlan('month')">
                                <div class="plan-row-body"><div class="plan-name">شهر</div><div class="plan-price">$20</div></div>
                                <div class="radio"><div class="radio-dot"></div></div>
                            </div>
                            <div class="plan-row" id="sp-3months" onclick="settingsSelectPlan('3months')">
                                <div class="plan-row-body"><div class="plan-name">3 أشهر</div><div class="plan-price">$50</div></div>
                                <div class="radio"><div class="radio-dot"></div></div>
                            </div>
                            <div class="plan-row" id="sp-6months" onclick="settingsSelectPlan('6months')">
                                <div class="plan-row-body"><div class="plan-name">6 أشهر</div><div class="plan-price">$80</div></div>
                                <div class="radio"><div class="radio-dot"></div></div>
                            </div>
                            <div class="plan-row" id="sp-year" onclick="settingsSelectPlan('year')">
                                <div class="plan-row-body"><div class="plan-name">سنة</div><div class="plan-price">$230</div></div>
                                <div class="radio"><div class="radio-dot"></div></div>
                            </div>
                            <div class="plan-row" id="sp-lifetime" onclick="settingsSelectPlan('lifetime')">
                                <div class="plan-row-body"><div class="plan-name">إلى الأبد</div><div class="plan-price">$500</div></div>
                                <div class="radio"><div class="radio-dot"></div></div>
                            </div>
                        </div>
                        <button class="sub-btn" onclick="settingsBuyNow()">${t.buyNow || 'شراء الآن'}</button>
                        <div class="sub-note">سيتم تحويلك إلى تيليغرام لإتمام الدفع.</div>
                    </div>
                </div>
            `;
            inner.innerHTML = settingsHTML;
            // Show the requested page
            document.querySelectorAll('.settings-inner .page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
            // Update theme/model checkmarks
            settingsUpdateUI();
        }

        function settingsGo(id) {
            settingsHistory.push(id);
            document.querySelectorAll('.settings-inner .page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function settingsBack() {
            if (settingsHistory.length <= 1) return;
            settingsHistory.pop();
            const prev = settingsHistory[settingsHistory.length-1];
            document.querySelectorAll('.settings-inner .page').forEach(p => p.classList.remove('active'));
            document.getElementById(prev).classList.add('active');
        }

        function settingsUpdateUI() {
            // Theme
            document.querySelectorAll('[id^="st-"]').forEach(el => el.innerHTML = '');
            const themeMap = { dark: 'st-dark', red: 'st-red', light: 'st-light' };
            const themeEl = document.getElementById(themeMap[currentTheme]);
            if (themeEl) themeEl.innerHTML = '<span style="color:var(--red)">✓</span>';

            // Model
            const model = getModelPreference();
            document.querySelectorAll('[id^="sm-"]').forEach(el => el.innerHTML = '');
            const modelMap = { v3: 'sm-v3', v6: 'sm-v6', mix: 'sm-mix' };
            const modelEl = document.getElementById(modelMap[model]);
            if (modelEl) modelEl.innerHTML = '<span style="color:var(--red)">✓</span>';
        }

        function settingsSetTheme(th) {
            setTheme(th);
            settingsUpdateUI();
            toast('المظهر: ' + th);
        }
        function settingsSetModel(m) {
            saveModelPreference(m);
            settingsUpdateUI();
            toast('النموذج: ' + m);
        }

        let settingsSelectedPlan = 'month';

        function settingsSelectPlan(plan) {
            settingsSelectedPlan = plan;
            document.querySelectorAll('.settings-inner .plan-row').forEach(el => el.classList.remove('selected'));
            const el = document.getElementById('sp-'+plan);
            if (el) el.classList.add('selected');
        }

        function settingsBuyNow() {
            const planName = translations[currentLang].planPrices ? Object.keys(translations[currentLang].planPrices).find(k => k === settingsSelectedPlan) : settingsSelectedPlan;
            const price = PLAN_PRICES[settingsSelectedPlan];
            const msg = `أريد شراء باقة ${planName} بسعر $${price}`;
            const url = `https://t.me/Shad0w010101?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
            toast('تم التوجيه إلى تيليغرام');
        }

        function settingsOpenSubscription() {
            settingsGo('page-subscribe');
        }

        function settingsConfirm(action) {
            if (action === 'logout') {
                if (confirm(translations[currentLang].logoutConfirm)) {
                    handleLogout();
                    closeSettingsFull();
                }
            }
        }

        // ── Open subscription directly from header button ──
        function openSubscription() {
            openSettingsFull();
            setTimeout(() => settingsOpenSubscription(), 200);
        }

        // ── Init ──
        function initApp() {
            if (isLoggedIn && currentUser.username) {
                document.getElementById('loginOverlay').classList.add('hidden');
                updateUserUI();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
            const savedLang = localStorage.getItem('wgpt_lang') || 'ar';
            const savedTheme = localStorage.getItem('wgpt_theme') || 'dark';
            const savedModel = localStorage.getItem('wgpt_model') || 'v6';
            setLang(savedLang);
            setTheme(savedTheme);
            document.getElementById('modelSelector').value = savedModel;
            if (activeSubscription) {
                document.getElementById('activationStatus').textContent = '✅ ' + (translations[currentLang].planActivated || 'تفعيل: ') + activeSubscription;
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && document.activeElement.id === 'loginPassword') handleLogin();
                if (e.key === 'Enter' && document.activeElement.id === 'loginUsername') handleLogin();
            });
            console.log('🐛 WormGPT v6 Final with full settings and subscription!');
        }
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
