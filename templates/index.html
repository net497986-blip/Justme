<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WormGPT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== نفس الـ CSS القديم (حافظت عليه) ===== */
:root {
  --red-deep:#6B0000; --red-core:#CC0000; --red-bright:#FF2020;
  --red-glow:#FF4444; --red-soft:#FF6666;
  --black:#080808; --dark1:#0F0F0F; --dark2:#181818; --dark3:#222;
  --sidebar-w:270px;
  --text:#FFF; --text-dim:#AAA; --text-muted:#555;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text);display:flex;flex-direction:column;}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.worm{position:absolute;border-radius:50%;filter:blur(70px);opacity:.055;animation:wormMove var(--d,12s) ease-in-out infinite alternate;}
.w1{width:320px;height:320px;background:var(--red-bright);top:-120px;left:-100px;--d:14s;}
.w2{width:220px;height:220px;background:var(--red-core);bottom:15%;right:-80px;--d:10s;}
.w3{width:160px;height:160px;background:var(--red-glow);top:45%;left:55%;--d:17s;}
@keyframes wormMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(35px,55px) scale(1.12)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(180,0,0,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(180,0,0,.022) 1px,transparent 1px);background-size:40px 40px;}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;z-index:1;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(204,0,0,.1),transparent);animation:scan 9s linear infinite;}
@keyframes scan{0%{transform:translateY(-2px)}100%{transform:translateY(100vh)}}

.app{position:relative;z-index:2;display:flex;flex-direction:column;height:100dvh;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;background:rgba(8,0,0,.97);border-bottom:1px solid #1A0000;flex-shrink:0;}
.h-left{display:flex;align-items:center;gap:9px;}
.menu-btn{width:34px;height:34px;background:var(--dark2);border:1px solid #250000;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .17s;}
.menu-btn:active{background:#2A0000;}
.menu-btn svg{width:17px;height:17px;fill:var(--text-dim);}
.logo-wrap{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--red-deep),var(--red-core));border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--red-bright);box-shadow:0 0 12px rgba(204,0,0,.45);}
.logo-icon svg{width:20px;height:20px;fill:var(--red-glow);filter:drop-shadow(0 0 4px var(--red-bright));}
.logo-name{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--red-bright);letter-spacing:1px;text-shadow:0 0 10px rgba(255,50,50,.6);line-height:1;}
.logo-sub{font-size:7.5px;color:var(--red-soft);letter-spacing:2.5px;opacity:.55;margin-top:2px;}
.new-chat-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;background:linear-gradient(135deg,var(--red-deep),var(--red-core));border:1px solid var(--red-bright);border-radius:9px;font-size:11.5px;font-weight:600;color:#fff;cursor:pointer;transition:all .17s;box-shadow:0 0 10px rgba(204,0,0,.3);}
.new-chat-btn:active{transform:scale(.93);}
.new-chat-btn svg{width:13px;height:13px;fill:#fff;}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;}
.sidebar-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:var(--sidebar-w);background:#0D0000;border-left:1px solid #220000;z-index:51;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.sidebar.open{transform:translateX(0);}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid #1E0000;flex-shrink:0;}
.sb-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--red-bright);letter-spacing:1px;}
.sb-close{width:30px;height:30px;background:var(--dark2);border:1px solid #2A0000;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sb-close svg{width:15px;height:15px;fill:var(--text-muted);}
.sb-new{margin:10px 12px;display:flex;align-items:center;gap:7px;padding:9px 12px;background:linear-gradient(135deg,#1A0000,#250000);border:1px solid var(--red-core);border-radius:10px;font-size:12px;color:var(--red-glow);cursor:pointer;transition:all .17s;}
.sb-new:active{background:#2A0000;}
.sb-new svg{width:14px;height:14px;fill:var(--red-glow);}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;scrollbar-width:thin;scrollbar-color:#330000 transparent;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:#440000;border-radius:3px;}
.sb-section-label{font-size:9px;color:var(--text-muted);letter-spacing:2px;padding:8px 6px 4px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative;}
.sb-item:hover,.sb-item.active{background:#1A0000;}
.sb-item.active{border-right:2px solid var(--red-core);}
.sb-item-icon{width:26px;height:26px;background:#1E0000;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-item-icon svg{width:13px;height:13px;fill:var(--red-glow);}
.sb-item-text{flex:1;min-width:0;}
.sb-item-title{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.sb-item-date{font-size:9.5px;color:var(--text-muted);margin-top:1px;}
.sb-item-del{width:22px;height:22px;background:#2A0000;border-radius:5px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;cursor:pointer;flex-shrink:0;}
.sb-item:hover .sb-item-del{opacity:1;}
.sb-item-del svg{width:11px;height:11px;fill:#FF5555;}

/* CHAT AREA */
.chat-area{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:#330000 transparent;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:#440000;border-radius:3px;}
.center-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:30px 20px;}
.center-ring{width:68px;height:68px;border-radius:50%;border:2px solid var(--red-core);display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(204,0,0,.35);position:relative;}
.center-ring::before{content:'';position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(204,0,0,.22);}
.center-ring svg{width:34px;height:34px;fill:var(--red-bright);filter:drop-shadow(0 0 7px var(--red-bright));}
.center-title{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;color:var(--red-bright);text-shadow:0 0 12px rgba(255,50,50,.5);}
.center-dev{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;}

/* MESSAGES */
.msg{display:flex;gap:9px;animation:msgIn .22s ease-out;}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--red-deep),var(--red-core));border:1px solid var(--red-bright);box-shadow:0 0 7px rgba(204,0,0,.4);}
.msg.user .msg-avatar{background:var(--dark3);border:1px solid #333;font-size:11px;color:var(--text-dim);}
.ai-avatar-svg{width:16px;height:16px;fill:var(--red-glow);}
.msg-col{display:flex;flex-direction:column;gap:3px;max-width:80%;}
.msg-bubble{padding:10px 12px;border-radius:13px;font-size:13.5px;line-height:1.58;white-space:pre-wrap;word-break:break-word;}
.msg.ai .msg-bubble{background:#140000;border:1px solid #2A0000;color:#EAEAEA;border-radius:4px 13px 13px 13px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--red-deep),#4A0000);border:1px solid var(--red-core);color:var(--text);border-radius:13px 4px 13px 13px;text-align:right;}
.msg-meta{font-size:9.5px;color:var(--text-muted);display:flex;align-items:center;gap:5px;}
.msg.user .msg-meta{justify-content:flex-end;}
.mode-tag{padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;}
.mode-tag.think{background:rgba(100,0,200,.18);color:#BB99FF;border:1px solid rgba(100,0,200,.28);}
.mode-tag.search{background:rgba(0,100,200,.18);color:#77BBFF;border:1px solid rgba(0,100,200,.28);}

/* Typing */
.thinking{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#140000;border:1px solid #2A0000;border-radius:4px 13px 13px 13px;}
.thinking-text{font-size:12px;color:var(--text-muted);font-style:italic;}
.dots{display:flex;gap:4px;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--red-core);animation:bounce 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

/* File bubble */
.file-msg{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#140000;border:1px solid #2A0000;border-radius:10px;}
.file-icon-msg{width:31px;height:31px;background:linear-gradient(135deg,var(--red-deep),var(--red-core));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.file-icon-msg svg{width:15px;height:15px;fill:#fff;}
.file-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.file-size{font-size:9px;color:var(--text-muted);}

/* INPUT */
.input-wrap{position:relative;z-index:5;padding:8px 11px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:rgba(8,0,0,.97);border-top:1px solid #170000;flex-shrink:0;}
.file-preview-strip{display:none;gap:7px;margin-bottom:7px;overflow-x:auto;scrollbar-width:none;}
.file-preview-strip.show{display:flex;}
.file-preview-strip::-webkit-scrollbar{display:none;}
.file-thumb{position:relative;flex-shrink:0;width:50px;height:50px;border-radius:9px;background:var(--dark2);border:1px solid #330000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;gap:2px;}
.file-thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px;}
.file-thumb svg{width:19px;height:19px;fill:var(--red-glow);}
.file-thumb-name{font-size:7px;color:var(--text-muted);text-align:center;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.file-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;background:var(--red-core);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:#fff;font-weight:700;}

.mode-pills{display:flex;gap:6px;margin-bottom:7px;}
.pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;cursor:pointer;border:1px solid #250000;background:var(--dark2);font-size:11px;font-weight:500;color:var(--text-muted);transition:all .18s;}
.pill svg{width:12px;height:12px;flex-shrink:0;}
.pill.think.on{background:#110022;border-color:#7744CC;color:#BB99FF;box-shadow:0 0 10px rgba(100,0,200,.2);}
.pill.search.on{background:#001122;border-color:#2255AA;color:#77BBFF;box-shadow:0 0 10px rgba(0,100,200,.2);}
/* زر التحرير المخصص */
.edit-btn{background:var(--red-core);color:#fff;border:none;padding:2px 12px;border-radius:12px;font-size:10px;cursor:pointer;margin-top:4px;transition:0.2s;}
.edit-btn:hover{background:var(--red-bright);}
.code-output{margin-top:6px;padding:8px;background:#0a0000;border:1px solid #441111;border-radius:8px;font-family:'Courier New',monospace;font-size:12px;color:#ff6666;white-space:pre-wrap;}

.input-row{display:flex;align-items:flex-end;gap:7px;}
.attach-btn{width:39px;height:39px;background:var(--dark2);border:1px solid #250000;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .17s;}
.attach-btn:active{background:#2A0000;border-color:var(--red-core);}
.attach-btn svg{width:18px;height:18px;fill:var(--text-muted);}
.input-box{flex:1;background:var(--dark2);border:1px solid #250000;border-radius:13px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);resize:none;max-height:100px;outline:none;transition:border-color .2s;line-height:1.45;}
.input-box::placeholder{color:var(--text-muted);}
.input-box:focus{border-color:var(--red-core);box-shadow:0 0 0 2px rgba(204,0,0,.1);}
.send-btn{width:39px;height:39px;background:linear-gradient(135deg,var(--red-deep),var(--red-core));border:1px solid var(--red-bright);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 0 11px rgba(204,0,0,.35);transition:all .17s;}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.send-btn svg{width:17px;height:17px;fill:#fff;}
input[type=file]{display:none;}
</style>
</head>

</header>

  <div class="mode-pills">
    <div class="pill think" id="pill-think" onclick="toggleMode('think')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a9 9 0 0 0-9 9c0 3.03 1.5 5.7 3.8 7.35L6 20h12l-.8-1.65A9 9 0 0 0 21 11a9 9 0 0 0-9-9zm-1 12V7h2v5.5l-3.54 2.1-.96-1.6L11 14z"/></svg>
      تفكير
    </div>
    <div class="pill search" id="pill-search" onclick="toggleMode('search')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      بحث
    </div>
  </div>
  <div class="input-row">
    <div class="attach-btn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
    </div>
    <textarea class="input-box" id="msgInput" placeholder="اكتب رسالتك..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <input type="file" id="fileInput" multiple accept="*/*" onchange="handleFiles(this.files)">
</div>

</div><!-- .app -->

<script>
/* ===== STATE ===== */
let thinkOn = false, searchOn = false;
let pendingFiles = [];
let isTyping = false;
let conversations = JSON.parse(localStorage.getItem('wgpt_convs') || '[]');
let activeCid = null;

function saveConvs() { try { localStorage.setItem('wgpt_convs', JSON.stringify(conversations)); } catch(e) {} }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

/* ===== SIDEBAR ===== */
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
    renderSidebar();
}

function renderSidebar() {
    const list = document.getElementById('sbList');
    list.innerHTML = '';
    if (!conversations.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:var(--text-muted);">لا توجد محادثات بعد</div>';
        return;
    }
    const now = Date.now();
    const day = 86400000;
    const groups = { today: [], yesterday: [], older: [] };
    [...conversations].reverse().forEach(c => {
        const age = now - c.date;
        if (age < day) groups.today.push(c);
        else if (age < 2 * day) groups.yesterday.push(c);
        else groups.older.push(c);
    });
    const labels = { today: 'اليوم', yesterday: 'أمس', older: 'أقدم' };
    for (const [k, arr] of Object.entries(groups)) {
        if (!arr.length) continue;
        const lbl = document.createElement('div');
        lbl.className = 'sb-section-label';
        lbl.textContent = labels[k];
        list.appendChild(lbl);
        arr.forEach(c => {
            const item = document.createElement('div');
            item.className = 'sb-item' + (c.id === activeCid ? ' active' : '');
            item.innerHTML = `
                <div class="sb-item-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
                <div class="sb-item-text"><div class="sb-item-title">${escHtml(c.title)}</div><div class="sb-item-date">${fmtDate(c.date)}</div></div>
                <div class="sb-item-del" onclick="deleteConv('${c.id}',event)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>`;
            item.onclick = () => loadConv(c.id);
            list.appendChild(item);
        });
    }
}

function deleteConv(id, e) {
    e.stopPropagation();
    conversations = conversations.filter(c => c.id !== id);
    saveConvs();
    if (activeCid === id) newChat();
    renderSidebar();
}

function loadConv(id) {
    activeCid = id;
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    const area = document.getElementById('chatArea');
    area.innerHTML = '';
    conv.messages.forEach(m => {
        addMsgDOM(m.role, m.content, null, m.thinkOn, m.searchOn);
    });
    toggleSidebar();
}

function getOrCreateConv() {
    if (activeCid) {
        const c = conversations.find(x => x.id === activeCid);
        if (c) return c;
    }
    const c = { id: genId(), title: 'محادثة جديدة', date: Date.now(), messages: [] };
    conversations.push(c);
    activeCid = c.id;
    saveConvs();
    return c;
}

function newChat() {
    activeCid = null;
    const area = document.getElementById('chatArea');
    area.innerHTML = `<div class="center-hint" id="centerHint">
        <div class="center-ring"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="width:34px;height:34px;fill:var(--red-bright);filter:drop-shadow(0 0 7px var(--red-bright));"><path d="M14.949 6.547a3.94 3.94 0 0 0-.348-3.273 4.11 4.11 0 0 0-4.4-1.934A4.1 4.1 0 0 0 8.423.2 4.15 4.15 0 0 0 6.305.086a4.1 4.1 0 0 0-1.891.948 4.04 4.04 0 0 0-1.158 1.753 4.1 4.1 0 0 0-1.563.679A4 4 0 0 0 .554 4.72a3.99 3.99 0 0 0 .502 4.731 3.94 3.94 0 0 0 .346 3.274 4.11 4.11 0 0 0 4.402 1.933c.382.425.852.764 1.377.995.526.231 1.095.35 1.67.346 1.78.002 3.358-1.132 3.901-2.804a4.1 4.1 0 0 0 1.563-.68 4 4 0 0 0 1.14-1.253 3.99 3.99 0 0 0-.506-4.716m-6.097 8.406a3.05 3.05 0 0 1-1.945-.694l.096-.054 3.23-1.838a.53.53 0 0 0 .265-.455v-4.49l1.366.778q.02.011.025.035v3.722c-.003 1.653-1.361 2.992-3.037 2.996m-6.53-2.75a2.95 2.95 0 0 1-.36-2.01l.095.057L5.29 12.09a.53.53 0 0 0 .527 0l3.949-2.246v1.555a.05.05 0 0 1-.022.041L6.473 13.3c-1.454.826-3.311.335-4.15-1.098m-.85-6.94A3.02 3.02 0 0 1 3.07 3.949v3.785a.51.51 0 0 0 .262.451l3.93 2.237-1.366.779a.05.05 0 0 1-.048 0L2.585 9.342a2.98 2.98 0 0 1-1.113-4.094zm11.216 2.571L8.747 5.576l1.362-.776a.05.05 0 0 1 .048 0l3.265 1.86a3 3 0 0 1 1.173 1.207 2.96 2.96 0 0 1-.27 3.2 3.05 3.05 0 0 1-1.36.997V8.279a.52.52 0 0 0-.276-.445m1.36-2.015-.097-.057-3.226-1.855a.53.53 0 0 0-.53 0L6.249 6.153V4.598a.04.04 0 0 1 .019-.04L9.533 2.7a3.07 3.07 0 0 1 3.257.139c.474.325.843.778 1.066 1.303.223.526.289 1.103.191 1.664zM5.503 8.575 4.139 7.8a.05.05 0 0 1-.026-.037V4.049c0-.57.166-1.127.476-1.607s.752-.864 1.275-1.105a3.08 3.08 0 0 1 3.234.41l-.096.054-3.23 1.838a.53.53 0 0 0-.265.455zm.742-1.577 1.758-1 1.762 1v2l-1.755 1-1.762-1z"/></svg></div>
        <div class="center-title">WormGPT</div>
        <div class="center-dev">by Shad0w010101</div>
    </div>`;
}

/* ===== MODES ===== */
function toggleMode(m) {
    if (m === 'think') { thinkOn = !thinkOn;
        document.getElementById('pill-think').classList.toggle('on', thinkOn); } else { searchOn = !searchOn;
        document.getElementById('pill-search').classList.toggle('on', searchOn); }
    updatePH();
}

function updatePH() {
    const i = document.getElementById('msgInput');
    if (thinkOn && searchOn) i.placeholder = 'فكّر وابحث...';
    else if (thinkOn) i.placeholder = 'اطرح سؤالاً للتحليل العميق...';
    else if (searchOn) i.placeholder = 'ابحث عن أي موضوع...';
    else i.placeholder = 'اكتب رسالتك...';
}

/* ===== INPUT ===== */
function autoResize(el) { el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
        sendMsg(); } }

function handleFiles(files) {
    for (const f of files) { if (pendingFiles.length >= 5) break;
        pendingFiles.push(f); }
    renderFileStrip();
}

function renderFileStrip() {
    const s = document.getElementById('fileStrip');
    s.innerHTML = '';
    if (!pendingFiles.length) { s.classList.remove('show'); return; }
    s.classList.add('show');
    pendingFiles.forEach((f, i) => {
        const t = document.createElement('div');
        t.className = 'file-thumb';
        if (f.type.startsWith('image/')) { const img = document.createElement('img');
            img.src = URL.createObjectURL(f);
            t.appendChild(img); } else { t.innerHTML = `<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg><div class="file-thumb-name">${f.name}</div>`; }
        const rm = document.createElement('div');
        rm.className = 'file-remove';
        rm.textContent = '×';
        rm.onclick = () => { pendingFiles.splice(i, 1);
            renderFileStrip(); };
        t.appendChild(rm);
        s.appendChild(t);
    });
}

/* ===== SEND ===== */
async function sendMsg() {
    const inp = document.getElementById('msgInput');
    const text = inp.value.trim();
    if (!text && !pendingFiles.length) return;
    if (isTyping) return;

    document.getElementById('centerHint')?.remove();

    const conv = getOrCreateConv();
    const files = pendingFiles.slice();
    const userContent = text || (files.length ? `📎 ${files.length} ملف` : '');

    conv.messages.push({ role: 'user', content: userContent, thinkOn, searchOn });
    if (conv.messages.length === 1) conv.title = text.slice(0, 38) || (files.length ? 'محادثة مع ملفات' : 'محادثة جديدة');
    conv.date = Date.now();
    saveConvs();

    addMsgDOM('user', userContent, files);
    inp.value = '';
    inp.style.height = 'auto';
    pendingFiles = [];
    renderFileStrip();

    const tid = showTyping();
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;

    try {
        const mode = thinkOn ? 'think' : (searchOn ? 'search' : 'chat');
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: userContent,
                mode: mode,
                files: files.map(f => f.name)
            })
        });
        const data = await response.json();
        removeTyping(tid);
        if (data.response) {
            addMsgDOM('ai', data.response, null, thinkOn, searchOn);
        } else {
            addMsgDOM('ai', '⚠️ حدث خطأ في المعالجة.', null, thinkOn, searchOn);
        }
    } catch (e) {
        removeTyping(tid);
        addMsgDOM('ai', '⚠️ حدث خطأ: ' + e.message, null, thinkOn, searchOn);
    }

    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
}

/* ===== RENDER MSG ===== */
const OPENAI_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="width:14px;height:14px;fill:var(--red-glow);"><path d="M14.949 6.547a3.94 3.94 0 0 0-.348-3.273 4.11 4.11 0 0 0-4.4-1.934A4.1 4.1 0 0 0 8.423.2 4.15 4.15 0 0 0 6.305.086a4.1 4.1 0 0 0-1.891.948 4.04 4.04 0 0 0-1.158 1.753 4.1 4.1 0 0 0-1.563.679A4 4 0 0 0 .554 4.72a3.99 3.99 0 0 0 .502 4.731 3.94 3.94 0 0 0 .346 3.274 4.11 4.11 0 0 0 4.402 1.933c.382.425.852.764 1.377.995.526.231 1.095.35 1.67.346 1.78.002 3.358-1.132 3.901-2.804a4.1 4.1 0 0 0 1.563-.68 4 4 0 0 0 1.14-1.253 3.99 3.99 0 0 0-.506-4.716m-6.097 8.406a3.05 3.05 0 0 1-1.945-.694l.096-.054 3.23-1.838a.53.53 0 0 0 .265-.455v-4.49l1.366.778q.02.011.025.035v3.722c-.003 1.653-1.361 2.992-3.037 2.996m-6.53-2.75a2.95 2.95 0 0 1-.36-2.01l.095.057L5.29 12.09a.53.53 0 0 0 .527 0l3.949-2.246v1.555a.05.05 0 0 1-.022.041L6.473 13.3c-1.454.826-3.311.335-4.15-1.098m-.85-6.94A3.02 3.02 0 0 1 3.07 3.949v3.785a.51.51 0 0 0 .262.451l3.93 2.237-1.366.779a.05.05 0 0 1-.048 0L2.585 9.342a2.98 2.98 0 0 1-1.113-4.094zm11.216 2.571L8.747 5.576l1.362-.776a.05.05 0 0 1 .048 0l3.265 1.86a3 3 0 0 1 1.173 1.207 2.96 2.96 0 0 1-.27 3.2 3.05 3.05 0 0 1-1.36.997V8.279a.52.52 0 0 0-.276-.445m1.36-2.015-.097-.057-3.226-1.855a.53.53 0 0 0-.53 0L6.249 6.153V4.598a.04.04 0 0 1 .019-.04L9.533 2.7a3.07 3.07 0 0 1 3.257.139c.474.325.843.778 1.066 1.303.223.526.289 1.103.191 1.664zM5.503 8.575 4.139 7.8a.05.05 0 0 1-.026-.037V4.049c0-.57.166-1.127.476-1.607s.752-.864 1.275-1.105a3.08 3.08 0 0 1 3.234.41l-.096.054-3.23 1.838a.53.53 0 0 0-.265.455zm.742-1.577 1.758-1 1.762 1v2l-1.755 1-1.762-1z"/></svg>`;

function addMsgDOM(role, text, files, tk, sk) {
    const area = document.getElementById('chatArea');
    const now = new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    if (role === 'ai') av.innerHTML = OPENAI_SVG;
    else av.textContent = '👤';
    wrap.appendChild(av);

    const col = document.createElement('div');
    col.className = 'msg-col';

    if (files?.length) {
        files.forEach(f => {
            const fm = document.createElement('div');
            fm.className = 'file-msg';
            const isImg = f.type?.startsWith('image/');
            fm.innerHTML = `<div class="file-icon-msg"><svg viewBox="0 0 24 24">${isImg ? '<path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>' : '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>'}</svg></div><div><div class="file-name">${escHtml(f.name)}</div><div class="file-size">${fmtSize(f.size)}</div></div>`;
            col.appendChild(fm);
        });
    }
    if (text) {
        const bub = document.createElement('div');
        bub.className = 'msg-bubble';
        // استخراج الأكواد وإضافة زر التحرير
        const codeMatch = text.match(/```(\w+)?\n([\s\S]*?)\n```/);
        if (codeMatch) {
            const lang = codeMatch[1] || 'code';
            const code = codeMatch[2];
            bub.innerHTML = `<pre><code>${code}</code></pre>
                             <button class="edit-btn" onclick="editCode(\`${code.replace(/`/g, '\\`')}\`, '${lang}')">✏️ تحرير الكود</button>
                             <div class="code-output" id="codeOutput_${Date.now()}"></div>`;
        } else {
            bub.textContent = text;
        }
        col.appendChild(bub);
    }
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    if (role === 'ai') {
        if (tk) { const t = document.createElement('span');
            t.className = 'mode-tag think';
            t.textContent = '🧠 تفكير';
            meta.appendChild(t); }
        if (sk) { const t = document.createElement('span');
            t.className = 'mode-tag search';
            t.textContent = '🔍 بحث';
            meta.appendChild(t); }
    }
    const tm = document.createElement('span');
    tm.textContent = now;
    meta.appendChild(tm);
    col.appendChild(meta);
    wrap.appendChild(col);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
}

// ===== دالة تحرير الكود =====
function editCode(code, lang) {
    const newCode = prompt(`✏️ تحرير الكود (${lang}):`, code);
    if (newCode !== null) {
        const outputDiv = document.querySelector('.code-output:last-child');
        if (outputDiv) {
            try {
                // محاولة تنفيذ الكود (آمن للتجربة)
                const result = eval(newCode);
                outputDiv.textContent = `✅ النتيجة:\n${String(result)}`;
            } catch (e) {
                outputDiv.textContent = `❌ خطأ: ${e.message}`;
            }
        }
    }
}

/* ===== TYPING ===== */
function showTyping() {
    const area = document.getElementById('chatArea');
    const id = 'typ-' + Date.now();
    const w = document.createElement('div');
    w.id = id;
    w.className = 'msg ai';
    const label = thinkOn ? 'يفكر...' : searchOn ? 'يبحث...' : 'يكتب...';
    w.innerHTML = `<div class="msg-avatar">${OPENAI_SVG}</div><div class="thinking"><div class="dots"><span></span><span></span><span></span></div><div class="thinking-text">${label}</div></div>`;
    area.appendChild(w);
    area.scrollTop = area.scrollHeight;
    return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

/* ===== UTILS ===== */
function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(1) + ' MB'; }

function fmtDate(ts) { const d = new Date(ts); return d.toLocaleDateString('ar', { month: 'short', day: 'numeric' }); }

function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

console.log('🐛 WormGPT Mini App loaded!');
console.log('📡 Waiting for user input...');
</script>
</body>
</html>
